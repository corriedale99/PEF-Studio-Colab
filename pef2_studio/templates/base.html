<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PEFスタジオ{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='studio.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('works_index') }}">PEFスタジオ 作品一覧</a>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <script>
      document.addEventListener("submit", (event) => {
        const form = event.target;
        if (!(form instanceof HTMLFormElement) || !form.dataset.busyMessage) {
          return;
        }
        if (form.dataset.busySubmitted === "1") {
          event.preventDefault();
          return;
        }
        form.dataset.busySubmitted = "1";
        const submitter = event.submitter;
        if (submitter instanceof HTMLButtonElement || submitter instanceof HTMLInputElement) {
          if (submitter.name) {
            const submitterValue = document.createElement("input");
            submitterValue.type = "hidden";
            submitterValue.name = submitter.name;
            submitterValue.value = submitter.value;
            form.appendChild(submitterValue);
          }
          submitter.classList.add("busy-submitter");
          submitter.dataset.originalLabel = submitter.value || submitter.textContent || "";
          if (submitter instanceof HTMLButtonElement) {
            submitter.textContent = "処理中です";
          } else if (submitter.type === "submit") {
            submitter.value = "処理中です";
          }
        }
        form.querySelectorAll('button[type="submit"], input[type="submit"]').forEach((button) => {
          button.disabled = true;
        });
        const message = document.createElement("p");
        message.className = "form-busy-message";
        message.textContent = form.dataset.busyMessage;
        form.insertAdjacentElement("afterend", message);
      });
    </script>
  </body>
</html>
